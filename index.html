<title>Trilha HubSpot</title>

<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  :root { color-scheme: dark; }
  body {
    min-height: 100vh;
    display: grid;
    place-items: center;
    padding: 1.5rem;
    background: #17120F;
    color: #F3EDE9;
    font-family: 'Segoe UI', system-ui, -apple-system, Arial, sans-serif;
  }
  .box {
    width: 100%;
    max-width: 23rem;
    display: flex;
    flex-direction: column;
    gap: 1rem;
    background: #1F1917;
    border: 1px solid #362D28;
    border-radius: 14px;
    padding: 1.75rem;
  }
  .eyebrow {
    font-family: ui-monospace, Consolas, monospace;
    font-size: .68rem;
    letter-spacing: .14em;
    text-transform: uppercase;
    color: #F5885F;
  }
  h1 { font-size: 1.35rem; font-weight: 800; letter-spacing: -.02em; line-height: 1.2; }
  p { font-size: .9rem; color: #B3A49B; line-height: 1.55; }
  form { display: flex; flex-direction: column; gap: .75rem; }
  input[type=password] {
    width: 100%;
    font: inherit;
    font-size: 1rem;
    color: #F3EDE9;
    background: #17120F;
    border: 1px solid #362D28;
    border-radius: 8px;
    padding: .8rem .9rem;
  }
  input[type=password]:focus { outline: 2px solid #F5885F; outline-offset: 1px; }
  button {
    font: inherit;
    font-size: .95rem;
    font-weight: 600;
    color: #1F1917;
    background: #F5885F;
    border: 0;
    border-radius: 8px;
    padding: .8rem;
    cursor: pointer;
  }
  button:disabled { opacity: .6; cursor: wait; }
  label.remember {
    display: flex;
    align-items: center;
    gap: .5rem;
    font-size: .85rem;
    color: #B3A49B;
    cursor: pointer;
  }
  .erro { font-size: .85rem; color: #F5885F; min-height: 1.2em; }
</style>
</head>

    <form id="f">

      </label>
      <button type="submit" id="btn">Entrar</button>
      <span class="erro" id="erro"></span>

const b64 = s => Uint8Array.from(atob(s), c => c.charCodeAt(0));

async function abrir(senha) {
  const enc = new TextEncoder();
  const base = await crypto.subtle.importKey("raw", enc.encode(senha), "PBKDF2", false, ["deriveKey"]);
  const key = await crypto.subtle.deriveKey(
    { name: "PBKDF2", salt: b64(PAYLOAD.salt), iterations: PAYLOAD.iter, hash: "SHA-256" },
    base, { name: "AES-GCM", length: 256 }, false, ["decrypt"]
  );
  const claro = await crypto.subtle.decrypt(
    { name: "AES-GCM", iv: b64(PAYLOAD.iv) }, key, b64(PAYLOAD.data)
  );
  return new TextDecoder().decode(claro);
}

function escrever(html) {
  document.open();

}

form.addEventListener("submit", async e => {
  e.preventDefault();
  const senha = document.getElementById("pw").value;
  btn.disabled = true;
  erro.textContent = "";
  try {
    const html = await abrir(senha);
    if (document.getElementById("lembrar").checked) {
      try { localStorage.setItem(KEY_CACHE, senha); } catch (_) {}
    }
    escrever(html);
  } catch (_) {
    erro.textContent = "Senha incorreta. Tente de novo.";
    btn.disabled = false;
  }
});

// Se ela já entrou antes neste aparelho, abre direto.
(async () => {
  let salva = null;
  try { salva = localStorage.getItem(KEY_CACHE); } catch (_) {}
  if (!salva) return;
  try { escrever(await abrir(salva)); }
  catch (_) { try { localStorage.removeItem(KEY_CACHE); } catch (_) {} }
})();
</script>
</body>
</html>

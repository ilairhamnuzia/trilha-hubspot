<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow, noarchive">
<meta name="color-scheme" content="light dark">
<title>Trilha HubSpot</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>&#129505;</text></svg>">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  :root { color-scheme: dark; }
  body {
    min-height: 100vh;
    display: grid;
    place-items: center;
    padding: 1.5rem;
    background: #17120F;
    color: #F3EDE9;
    font-family: 'Segoe UI', system-ui, -apple-system, Arial, sans-serif;
  }
  .box {
    width: 100%;
    max-width: 23rem;
    display: flex;
    flex-direction: column;
    gap: 1rem;
    background: #1F1917;
    border: 1px solid #362D28;
    border-radius: 14px;
    padding: 1.75rem;
  }
  .eyebrow {
    font-family: ui-monospace, Consolas, monospace;
    font-size: .68rem;
    letter-spacing: .14em;
    text-transform: uppercase;
    color: #F5885F;
  }
  h1 { font-size: 1.35rem; font-weight: 800; letter-spacing: -.02em; line-height: 1.2; }
  p { font-size: .9rem; color: #B3A49B; line-height: 1.55; }
  form { display: flex; flex-direction: column; gap: .75rem; }
  input[type=password], input[type=text] {
    width: 100%;
    font: inherit;
    font-size: 1rem;
    color: #F3EDE9;
    background: #17120F;
    border: 1px solid #362D28;
    border-radius: 8px;
    padding: .8rem .9rem;
  }
  input[type=password]:focus, input[type=text]:focus { outline: 2px solid #F5885F; outline-offset: 1px; }
  button {
    font: inherit;
    font-size: .95rem;
    font-weight: 600;
    color: #1F1917;
    background: #F5885F;
    border: 0;
    border-radius: 8px;
    padding: .8rem;
    cursor: pointer;
  }
  button:disabled { opacity: .6; cursor: wait; }
  /* O campo de senha e o botao de revelar dividem a mesma moldura. */
  .campo-senha { position: relative; }
  .campo-senha input { padding-right: 5.2rem; }
  .campo-senha button {
    position: absolute;
    top: 50%;
    right: .4rem;
    transform: translateY(-50%);
    width: auto;
    font-size: .78rem;
    font-weight: 600;
    color: #F5885F;
    background: none;
    padding: .4rem .5rem;
  }
  .campo-senha button:hover { text-decoration: underline; }
  label.remember {
    display: flex;
    align-items: center;
    gap: .5rem;
    font-size: .85rem;
    color: #B3A49B;
    cursor: pointer;
  }
  .erro { font-size: .85rem; color: #F5885F; min-height: 1.2em; }
</style>
</head>
<body>
  <div class="box">
    <span class="eyebrow">Conteúdo protegido</span>
    <h1>Trilha de CRM HubSpot</h1>
    <p>Digite a senha que você recebeu junto com este link.</p>
    <form id="f">
      <input type="text" id="nome" placeholder="Seu nome" autocomplete="name" autofocus required>
      <div class="campo-senha">
        <input type="password" id="pw" placeholder="Senha" autocomplete="current-password" required>
        <button type="button" id="ver" aria-label="Mostrar senha" aria-pressed="false">Mostrar</button>
      </div>
      <button type="submit" id="btn">Entrar</button>
      <span class="erro" id="erro"></span>
    </form>
  </div>

const LOG_URL = "https://trilha-acessos.ilaicortesr.workers.dev/";
// A senha nao e mais guardada: cada visita pede a senha de novo.
// Estas chaves so existem para apagar o que versoes anteriores deixaram salvo.
const KEY_CACHE = "trilha-hubspot-pw";
const KEY_NOME = "trilha-hubspot-nome";

try {
  localStorage.removeItem(KEY_CACHE);
  localStorage.removeItem(KEY_NOME);
} catch (_) {}

const b64 = s => Uint8Array.from(atob(s), c => c.charCodeAt(0));

async function abrir(senha) {
  const enc = new TextEncoder();
  const base = await crypto.subtle.importKey("raw", enc.encode(senha), "PBKDF2", false, ["deriveKey"]);
  const key = await crypto.subtle.deriveKey(
    { name: "PBKDF2", salt: b64(PAYLOAD.salt), iterations: PAYLOAD.iter, hash: "SHA-256" },
    base, { name: "AES-GCM", length: 256 }, false, ["decrypt"]
  );
  const claro = await crypto.subtle.decrypt(
    { name: "AES-GCM", iv: b64(PAYLOAD.iv) }, key, b64(PAYLOAD.data)
  );
  return new TextDecoder().decode(claro);
}

function escrever(html) {
  document.open();
  document.write(html);
  document.close();
}

const form = document.getElementById("f");
const erro = document.getElementById("erro");
const btn = document.getElementById("btn");
const campoNome = document.getElementById("nome");
const campoSenha = document.getElementById("pw");
const verBtn = document.getElementById("ver");

verBtn.addEventListener("click", () => {
  const mostrando = campoSenha.type === "text";
  campoSenha.type = mostrando ? "password" : "text";
  verBtn.textContent = mostrando ? "Mostrar" : "Ocultar";
  verBtn.setAttribute("aria-label", mostrando ? "Mostrar senha" : "Ocultar senha");
  verBtn.setAttribute("aria-pressed", String(!mostrando));
  campoSenha.focus();
});

// Registra o acesso só depois de a senha ter sido aceita.
//
// Esperamos o envio terminar antes de abrir o conteúdo: quem abre o conteúdo é
// um document.write, que destrói a página inteira e cancelaria a requisição no meio.
// Mas esperamos no máximo 3 segundos — se o registro falhar (rede fora, endpoint em
// manutenção), o acesso acontece assim mesmo: um log quebrado não pode ser motivo
// para barrar quem tem a senha certa.
async function registrar(nome) {
  if (!LOG_URL || !nome) return;
  try {
    await Promise.race([
      fetch(LOG_URL, {
        method: "POST",
        // text/plain evita o pedido de permissão (preflight) antes do envio.
        headers: { "content-type": "text/plain" },
        body: JSON.stringify({ nome })
      }),
      new Promise(r => setTimeout(r, 3000))
    ]);
  } catch (_) { /* segue e abre o conteúdo */ }
}

form.addEventListener("submit", async e => {
  e.preventDefault();
  const senha = document.getElementById("pw").value;
  const nome = campoNome ? campoNome.value.trim() : "";
  btn.disabled = true;
  erro.textContent = "";
  try {
    const html = await abrir(senha);
    // A pagina interna usa o nome so para montar as iniciais do avatar.
    // sessionStorage, e nao localStorage: morre quando a aba fecha, entao a
    // senha continua sendo pedida em toda visita.
    try { sessionStorage.setItem(KEY_NOME, nome); } catch (_) {}
    await registrar(nome);
    escrever(html);
  } catch (_) {
    erro.textContent = "Senha incorreta. Tente de novo.";
    btn.disabled = false;
  }
});
</script>
</body>
</html>
